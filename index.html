<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomMods - Dashboard</title>
    <link rel="icon" type="image/jpeg" href="static/SiteImage/SiteIm.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ПОВНИЙ ПЕРЕНОС СТИЛІВ З ТВОГО STYLE.CSS */
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: #111; color: #ddd; 
            background-image: radial-gradient(circle at 50% -20%, #251a3a 0%, #111 80%); 
            min-height: 100vh; overflow-x: hidden; 
        }
        .navbar { 
            background: #1a1a1a; padding: 15px 40px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid #2c2c2c; position: sticky; top: 0; z-index: 1000; 
        }
        .site-name { font-size: 26px; font-weight: 600; color: #c0a0ff; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        
        .search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 350px; }
        .search-input { 
            width: 100%; padding: 10px 15px; border-radius: 25px; background: #222; 
            border: 1px solid #333; color: white; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: #c0a0ff; box-shadow: 0 0 10px rgba(192, 160, 255, 0.3); }

        #search-results { 
            position: absolute; top: 50px; left: 0; right: 0; background: #1c1c1c; 
            border-radius: 12px; border: 1px solid #444; display: none; max-height: 350px; 
            overflow-y: auto; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .result-item { display: flex; align-items: center; padding: 12px; text-decoration: none; color: white; border-bottom: 1px solid #222; cursor: pointer; }
        .result-item:hover { background: #251a3a; }
        .result-item img { width: 50px; height: 30px; object-fit: cover; margin-right: 12px; border-radius: 4px; }

        .nav-links a { color: #aaa; text-decoration: none; margin-left: 20px; transition: 0.3s; cursor: pointer; font-weight: 600; }
        .nav-links a:hover { color: #c0a0ff; }
        
        .content { width: 95%; max-width: 1400px; margin: 40px auto; }
        .section-header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 40px; }
        .section-title { color: #c0a0ff; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 24px; }
        
        .install-btn { 
            background: #251a3a; border: 1px solid #c0a0ff; color: #c0a0ff; padding: 10px 20px; 
            border-radius: 25px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; 
        }
        .install-btn:hover { background: #c0a0ff; color: #111; box-shadow: 0 0 15px rgba(192, 160, 255, 0.4); }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .game-card { 
            background: #1c1c1c; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            text-align: center; position: relative; opacity: 0; transform: translateY(20px); 
            animation: fadeInUp 0.8s forwards; border: 1px solid transparent; transition: all 0.3s ease; 
        }
        .game-card:hover { transform: translateY(-8px); border-color: #c0a0ff; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; display: block; transition: 0.4s; }
        .game-card:hover img { transform: scale(1.05); }
        .game-name { padding: 15px; font-weight: 600; font-size: 18px; }

        .source-btn { 
            position: absolute; top: 12px; left: 12px; z-index: 10;
            padding: 5px 12px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            border: 1px solid rgba(192, 160, 255, 0.5); color: #c0a0ff; border-radius: 8px;
            font-size: 11px; text-transform: uppercase; font-weight: 600; text-decoration: none;
        }

        .info-box { 
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20, 0, 40, 0.95); 
            padding: 15px; font-size: 14px; opacity: 0; transform: translateY(100%); transition: 0.3s ease; pointer-events: none; 
        }
        .game-card:hover .info-box { opacity: 1; transform: translateY(0); }

        /* МОДАЛКА */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #161618; padding: 40px; border-radius: 30px; border: 1px solid rgba(192, 160, 255, 0.3); max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: #777; }
        .step-box { background: rgba(255,255,255,0.03); margin-bottom: 25px; padding: 25px; border-radius: 20px; border-left: 5px solid #c0a0ff; }
        .step-title { font-weight: 600; color: #fff; font-size: 18px; display: block; }
        .step-gif { width: 100%; max-width: 500px; display: block; margin: 15px auto; border-radius: 12px; }
        
        .return-btn { background: transparent; border: 1px solid #c0a0ff; color: #c0a0ff; padding: 12px 30px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .return-btn:hover { background: #c0a0ff; color: #111; }

        .page { display: none; }
        .page.active { display: block; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="site-name" onclick="showPage('home')">RandomMods</div>
        <div class="search-container">
            <input type="text" id="live-search" class="search-input" placeholder="Пошук модифікацій..." autocomplete="off">
            <div id="search-results"></div>
        </div>
        <div class="nav-links">
            <a onclick="showPage('home')">Головна</a>
        </div>
    </div>

    <div id="installModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleModal()">&times;</span>
            <h2 style="color:#c0a0ff; text-align:center; margin-top:0;">ІНСТРУКЦІЯ ВСТАНОВЛЕННЯ</h2>
            <div class="step-box"><span class="step-title">1. Скачайте файл (.vpk)</span><img src="static/GifsDota2/Tut1.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">2. Створіть папку "addons"</span><img src="static/GifsDota2/Tut2.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">3. Перекиньте мод у папку</span><img src="static/GifsDota2/Tut3.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">4. Параметри запуску Steam</span><code style="display:block; background:#000; color:#c0a0ff; padding:12px; border-radius:10px; text-align:center; margin-top:10px;">-language addons</code><img src="static/GifsDota2/Tut4.gif" class="step-gif"></div>
            <div style="text-align:center;"><button class="install-btn" onclick="toggleModal()">Зрозумів</button></div>
        </div>
    </div>

    <div class="content">
        <div id="page-home" class="page active">
            <h2 class="section-title">Виберіть гру</h2>
            <div class="games-grid" id="games-list"></div>
        </div>
        <div id="page-categories" class="page">
            <div class="section-header"><h2 class="section-title" id="cat-game-title"></h2><button class="install-btn" onclick="toggleModal()">Як встановити?</button></div>
            <div class="games-grid" id="categories-list"></div>
            <div style="text-align:center;margin-top:40px;"><button class="return-btn" onclick="showPage('home')">Назад</button></div>
        </div>
        <div id="page-mods" class="page">
            <div class="section-header"><h2 class="section-title" id="mod-cat-title"></h2><button class="install-btn" onclick="toggleModal()">Як встановити?</button></div>
            <div class="games-grid" id="mods-list"></div>
            <div style="text-align:center;margin-top:40px;"><button id="back-to-cats" class="return-btn">Назад</button></div>
        </div>
    </div>

    <script>
        // --- ДАНІ ПРЯМО З ТВОГО MODS.PY ---
        const DATA = {
            games: {
                "Dota2": { img: "images/game1.jpg", folderC: "ImagesDota2C", folderM: "ImagesDota2M" },
                "Test": { img: "images/game2.jpg", folderC: "ImagesTestC", folderM: "ImagesTestM" }
            },
            categories: {
                "Dota2": {
                    "categ1": { name: "Announcers", info: "Змінює стандартний голос коментатора на кастомний." },
                    "categ2": { name: "Emblems", info: "Унікальні візуальні емблеми під героєм." },
                    "categ3": { name: "Fog", info: "Змінює візуальні ефекти туману війни." }
                }
            },
            mods: {
                "Dota2": {
                    "categ1": [
                        { id: "mod1", name: "Sexy Woman Mega-Kill", file: "pak01_dir.vpk", info: "Гаряча озвучка для серій вбивств.", source: "https://en.dota2changer.com/skins_dota_2_mods-sexy_woman_mega-kill/" },
                        { id: "mod2", name: "Announcer Pack 2", file: "pak09_dir.vpk", info: "Другий пакет крутих коментарів." }
                    ],
                    "categ2": [
                        { id: "mod3", name: "Emblem of the Diretide Green", file: "pak02_dir.vpk", info: "Зелене сяйво Diretide для справжніх олдів.", source: "https://h6rd.github.io/Dota2PornFxWeb/?category=emblems&mod=Emblem+of+the+Diretide+Green" },
                        { id: "mod4", name: "Emblem of the Diretide Red", file: "pak03_dir.vpk", info: "Червоне сяйво Diretide, виглядає агресивно.", source: "https://h6rd.github.io/Dota2PornFxWeb/?category=emblems&mod=Emblem+of+the+Diretide+Red" }
                    ],
                    "categ3": [
                        { id: "mod5", name: "Classic Blue Fog", file: "pak04_dir.vpk", info: "Повертає атмосферний синій туман." }
                    ]
                }
            }
        };

        // --- ЛОГІКА ---
        function showPage(p) { document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); window.scrollTo(0,0); }
        function toggleModal() { const m=document.getElementById('installModal'); m.style.display=m.style.display==='flex'?'none':'flex'; }
        
        function downloadFile(f) {
            const a = document.createElement('a');
            a.href = 'static/files/' + f; // СЮДИ КЛАДИ СВОЇ .VPK ФАЙЛИ
            a.download = f;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function renderHome() {
            const g = document.getElementById('games-list');
            g.innerHTML = Object.entries(DATA.games).map(([n,d],i)=>`
                <div class="game-card" onclick="renderCats('${n}')" style="animation-delay:${i*0.1}s">
                    <img src="static/${d.img}">
                    <div class="game-name">${n}</div>
                </div>`).join('');
        }

        function renderCats(game) {
            const list = document.getElementById('categories-list');
            document.getElementById('cat-game-title').innerText = game;
            const cats = DATA.categories[game];
            list.innerHTML = Object.entries(cats).map(([id,c],i)=>`
                <div class="game-card" onclick="renderMods('${game}','${id}')" style="animation-delay:${i*0.1}s">
                    <img src="static/${DATA.games[game].folderC}/${id}.png">
                    <div class="game-name">${c.name}</div>
                    <div class="info-box">${c.info}</div>
                </div>`).join('');
            showPage('categories');
        }

        function renderMods(game, cat) {
            const list = document.getElementById('mods-list');
            document.getElementById('mod-cat-title').innerText = DATA.categories[game][cat].name;
            document.getElementById('back-to-cats').onclick = () => renderCats(game);
            list.innerHTML = DATA.mods[game][cat].map((m,i)=>`
                <div id="card-${m.id}" class="game-card" style="animation-delay:${i*0.05}s">
                    ${m.source?`<a href="${m.source}" target="_blank" class="source-btn">Source</a>`:''}
                    <img src="static/${DATA.games[game].folderM}/${m.id}.png" onclick="downloadFile('${m.file}')">
                    <div class="game-name">${m.name}</div>
                    <div class="info-box">${m.info}</div>
                </div>`).join('');
            showPage('mods');
        }

        // Пошук
        const si = document.getElementById('live-search'), rb = document.getElementById('search-results');
        si.oninput = (e) => {
            const q = e.target.value.toLowerCase().trim();
            if(!q){rb.style.display='none';return;}
            let res = [];
            Object.entries(DATA.mods).forEach(([g,cc])=>Object.entries(cc).forEach(([cid,mm])=>mm.forEach(m=>{
                if(m.name.toLowerCase().includes(q)) res.push({g,cid,m});
            })));
            if(res.length){
                rb.innerHTML = res.slice(0,8).map(r=>`
                    <div class="result-item" onclick="goToMod('${r.g}','${r.cid}','${r.m.id}')">
                        <img src="static/${DATA.games[r.g].folderM}/${r.m.id}.png">
                        <div><b>${r.m.name}</b><br><small>${r.g}</small></div>
                    </div>`).join('');
                rb.style.display='block';
            } else rb.style.display='none';
        };

        function goToMod(g,c,id) { rb.style.display='none'; renderMods(g,c); setTimeout(()=>{
            const el=document.getElementById('card-'+id); if(el) el.scrollIntoView({behavior:'smooth'});
        },200); }

        renderHome();
    </script>
</body>
</html>
