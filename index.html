<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomMods - Dashboard</title>
    <link rel="icon" type="image/jpeg" href="static/SiteImage/SiteIm.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #111; color: #ddd; background-image: radial-gradient(circle at 50% -20%, #251a3a 0%, #111 80%); min-height: 100vh; overflow-x: hidden; }
        .navbar { background: #1a1a1a; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c2c2c; position: sticky; top: 0; z-index: 1000; }
        .site-name { font-size: 26px; font-weight: 600; color: #c0a0ff; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 350px; }
        .search-input { width: 100%; padding: 10px 15px; border-radius: 25px; background: #222; border: 1px solid #333; color: white; outline: none; }
        .content { width: 95%; max-width: 1400px; margin: 40px auto; text-align: center; }
        .section-title { color: #c0a0ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .game-card { background: #1c1c1c; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); position: relative; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s forwards; border: 1px solid transparent; transition: 0.3s; cursor: pointer; }
        .game-card:hover { transform: translateY(-8px); border-color: #c0a0ff; }
        .game-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .game-name { padding: 15px; font-weight: 600; font-size: 18px; }
        .info-box { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20, 0, 40, 0.95); padding: 15px; font-size: 14px; opacity: 0; transform: translateY(100%); transition: 0.3s; pointer-events: none; }
        .game-card:hover .info-box { opacity: 1; transform: translateY(0); }
        .return-btn { background: transparent; border: 1px solid #c0a0ff; color: #c0a0ff; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 20px; }
        .return-btn:hover { background: #c0a0ff; color: #111; }
        .page { display: none; }
        .page.active { display: block; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="site-name" onclick="showPage('home')">RandomMods</div>
        <div class="search-container"><input type="text" class="search-input" placeholder="Пошук..."></div>
        <div class="nav-links"><a onclick="showPage('home')" style="cursor:pointer; color:#c0a0ff">Головна</a></div>
    </div>

    <div class="content">
        <div id="page-home" class="page active">
            <h2 class="section-title">Виберіть гру</h2>
            <div class="games-grid" id="games-list"></div>
        </div>

        <div id="page-categories" class="page">
            <h2 class="section-title" id="cat-title"></h2>
            <div class="games-grid" id="categories-list"></div>
            <button class="return-btn" onclick="showPage('home')">Назад до ігор</button>
        </div>

        <div id="page-mods" class="page">
            <h2 class="section-title" id="mod-title"></h2>
            <div class="games-grid" id="mods-list"></div>
            <button id="back-to-cats" class="return-btn">Назад до категорій</button>
        </div>
    </div>

    <script>
        const DATA = {
            // Прямий шлях до твого репозиторію
            root: "https://randommods.github.io/mods/Dota2/",
            
            categories: {
                "Dota2": {
                    "categ1": { n: "Announcers", folder: "Announcers", i: "Змінює голос коментатора." },
                    "categ2": { n: "Emblems", folder: "Emblems", i: "Унікальні емблеми під героєм." },
                    "categ3": { n: "Fog", folder: "Fog", i: "Змінює візуальні ефекти туману." }
                }
            },
            
            mods: {
                "Dota2": {
                    "categ1": [{id:"mod1", n:"Sexy Woman Mega-Kill", f:"pak01_dir.vpk"}, {id:"mod2", n:"Announcer Pack 2", f:"pak09_dir.vpk"}],
                    "categ2": [{id:"mod3", n:"Emblem Green", f:"pak02_dir.vpk"}, {id:"mod4", n:"Emblem Red", f:"pak03_dir.vpk"}],
                    "categ3": [{id:"mod5", n:"Classic Blue Fog", f:"pak04_dir.vpk"}]
                }
            }
        };

        function showPage(p) { document.querySelectorAll('.page').forEach(e=>e.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }

        function renderHome() {
            const l = document.getElementById('games-list');
            l.innerHTML = `<div class="game-card" onclick="renderCats('Dota2')"><img src="static/images/game1.jpg"><div class="game-name">Dota 2</div></div>`;
        }

        function renderCats(g) {
            const l = document.getElementById('categories-list');
            document.getElementById('cat-title').innerText = g;
            l.innerHTML = Object.entries(DATA.categories[g]).map(([id, c]) => `
                <div class="game-card" onclick="renderMods('${g}','${id}')">
                    <img src="static/ImagesDota2C/${id}.png">
                    <div class="game-name">${c.n}</div>
                    <div class="info-box">${c.i}</div>
                </div>`).join('');
            showPage('categories');
        }

        function renderMods(g, cid) {
            const l = document.getElementById('mods-list');
            const cat = DATA.categories[g][cid];
            document.getElementById('mod-title').innerText = cat.n;
            document.getElementById('back-to-cats').onclick = () => renderCats(g);
            
            l.innerHTML = DATA.mods[g][cid].map(m => {
                // ФОРМУЄМО ПОСИЛАННЯ: root + папка категорії + файл
                const fileUrl = DATA.root + cat.folder + "/" + m.f;
                return `
                <div class="game-card">
                    <a href="${fileUrl}" download="${m.f}" style="text-decoration:none; color:inherit;">
                        <img src="static/ImagesDota2M/${m.id}.png">
                        <div class="game-name">${m.n}</div>
                        <div class="info-box">Натисніть, щоб скачати ${m.f}</div>
                    </a>
                </div>`;
            }).join('');
            showPage('mods');
        }

        renderHome();
    </script>
</body>
</html>
