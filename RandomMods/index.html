<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>RandomMods - Dashboard</title>
    <link rel="icon" type="image/jpeg" href="static/SiteImage/SiteIm.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ПОВНИЙ ПЕРЕНОС ТВОЇХ СТИЛІВ З style.css */
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: #111; color: #ddd; 
            background-image: radial-gradient(circle at 50% -20%, #251a3a 0%, #111 80%); 
            min-height: 100vh; overflow-x: hidden; 
        }
        .navbar { 
            background: #1a1a1a; padding: 15px 40px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid #2c2c2c; position: sticky; top: 0; z-index: 1000; 
        }
        .site-name { font-size: 26px; font-weight: 600; color: #c0a0ff; text-transform: uppercase; letter-spacing: 1px; }
        
        .search-container { position: absolute; left: 50%; transform: translateX(-50%); width: 350px; }
        .search-input { 
            width: 100%; padding: 8px 15px; border-radius: 20px; background: #222; 
            border: 1px solid #333; color: white; outline: none; transition: 0.3s;
        }
        #search-results { 
            position: absolute; top: 45px; left: 0; right: 0; background: #1c1c1c; 
            border-radius: 10px; border: 1px solid #444; display: none; max-height: 300px; 
            overflow-y: auto; z-index: 2000; 
        }
        .result-item { display: flex; align-items: center; padding: 10px; text-decoration: none; color: white; border-bottom: 1px solid #222; cursor: pointer; }
        .result-item:hover { background: #251a3a; }
        .result-item img { width: 40px; height: 25px; object-fit: cover; margin-right: 10px; border-radius: 3px; }

        .nav-links a { color: #aaa; text-decoration: none; margin-left: 20px; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { color: #c0a0ff; }
        
        .content { width: 95%; max-width: 1400px; margin: 40px auto; }
        .section-header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .section-title { color: #c0a0ff; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .install-btn { 
            background: #251a3a; border: 1px solid #c0a0ff; color: #c0a0ff; padding: 8px 18px; 
            border-radius: 25px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; 
        }
        .install-btn:hover { background: #c0a0ff; color: #111; box-shadow: 0 0 15px rgba(192, 160, 255, 0.4); }

        .games-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        
        .game-card { 
            background: #1c1c1c; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            text-align: center; position: relative; opacity: 0; transform: translateY(20px); 
            animation: fadeInUp 0.8s forwards; border: 1px solid transparent; transition: all 0.3s ease; 
        }
        .game-card:hover { transform: translateY(-5px); border-color: #c0a0ff; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; cursor: pointer; display: block; }
        .game-name { padding: 12px; font-weight: 600; }

        .game-card:target {
            border-color: #ffcc00 !important;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.7);
            animation: pulse-glow 2s infinite ease-in-out, fadeInUp 0.8s forwards;
        }

        .source-btn { 
            position: absolute; top: 10px; left: 10px; z-index: 10;
            padding: 4px 10px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            border: 1px solid rgba(192, 160, 255, 0.5); color: #c0a0ff; border-radius: 8px;
            font-size: 10px; text-transform: uppercase; font-weight: 600; text-decoration: none;
        }

        .info-box { 
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20, 0, 40, 0.95); 
            padding: 10px; font-size: 13px; opacity: 0; transform: translateY(100%); transition: 0.3s; pointer-events: none; 
        }
        .game-card:hover .info-box { opacity: 1; transform: translateY(0); }

        /* МОДАЛКА ТУТОРІАЛА */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { 
            background: #161618; padding: 35px; border-radius: 25px; border: 1px solid rgba(192, 160, 255, 0.3); 
            max-width: 600px; width: 95%; max-height: 85vh; overflow-y: auto; position: relative; 
        }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #555; }
        .step-box { background: rgba(255,255,255,0.03); margin-bottom: 25px; padding: 20px; border-radius: 15px; border-left: 4px solid #c0a0ff; }
        .step-title { font-weight: 600; color: #fff; font-size: 17px; margin-bottom: 10px; display: block; }
        .step-gif { width: 75%; display: block; margin: 15px auto; border-radius: 10px; }
        
        .return-btn { background: transparent; border: 1px solid #c0a0ff; color: #c0a0ff; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; cursor: pointer; display: inline-block; }

        .page { display: none; }
        .page.active { display: block; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="site-name" onclick="showPage('home')" style="cursor:pointer">RandomMods</div>
        <div class="search-container">
            <input type="text" id="live-search" class="search-input" placeholder="Пошук..." autocomplete="off">
            <div id="search-results"></div>
        </div>
        <div class="nav-links">
            <a onclick="showPage('home')">Home</a>
        </div>
    </div>

    <div id="installModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleModal()">&times;</span>
            <h2 style="color:#c0a0ff; text-align:center; margin-top:0;">ІНСТРУКЦІЯ</h2>
            <div class="step-box"><span class="step-title">1. Скачайте файл (.vpk)</span><img src="static/GifsDota2/Tut1.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">2. Створіть папку "addons"</span><img src="static/GifsDota2/Tut2.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">3. Перекиньте мод у папку</span><img src="static/GifsDota2/Tut3.gif" class="step-gif"></div>
            <div class="step-box"><span class="step-title">4. Параметри запуску Steam</span><code style="display:block; background:#000; color:#c0a0ff; padding:10px; border-radius:8px; text-align:center;">-language addons</code><img src="static/GifsDota2/Tut4.gif" class="step-gif"></div>
            <div style="text-align:center;"><button class="install-btn" onclick="toggleModal()">Зрозумів</button></div>
        </div>
    </div>

    <div class="content">
        <div id="page-home" class="page active">
            <h2 class="section-title">Select a Game</h2>
            <div class="games-grid" id="games-list"></div>
        </div>
        <div id="page-categories" class="page">
            <div class="section-header">
                <h2 class="section-title" id="cat-game-title"></h2>
                <button class="install-btn" onclick="toggleModal()">How to install?</button>
            </div>
            <div class="games-grid" id="categories-list"></div>
            <div style="text-align:center;margin-top:40px;"><a class="return-btn" onclick="showPage('home')">Back</a></div>
        </div>
        <div id="page-mods" class="page">
            <div class="section-header">
                <h2 class="section-title" id="mod-cat-title"></h2>
                <button class="install-btn" onclick="toggleModal()">How to install?</button>
            </div>
            <div class="games-grid" id="mods-list"></div>
            <div style="text-align:center;margin-top:40px;"><a id="back-to-cats" class="return-btn">Back</a></div>
        </div>
    </div>

    <script>
        // ПОВНИЙ ПЕРЕНОС ДАНИХ З MODS.PY
        const CATEGORY_IMAGES = {"Dota2": "ImagesDota2C", "Test": "ImagesTestC"};
        const MOD_IMAGES = {"Dota2": "ImagesDota2M", "Test": "ImagesTestM"};

        const CATEGORY_MODS_MAP = {
            "Dota2": {
                "categ1": [["pak01_dir.vpk", "mod1"], ["pak09_dir.vpk", "mod2"]],
                "categ2": [["pak02_dir.vpk", "mod3"], ["pak03_dir.vpk", "mod4"]],
                "categ3": [["pak04_dir.vpk", "mod5"]]
            }
        };

        const CATEGORY_DISPLAY = {"Dota2": {"categ1": "Announcers", "categ2": "Emblems", "categ3": "Fog"}};
        const CATEGORY_INFO = {"Dota2": {
            "categ1": "Змінює стандартний голос коментатора на кастомний.",
            "categ2": "Унікальні візуальні емблеми під героєм.",
            "categ3": "Змінює візуальні ефекти туману війни."
        }};

        const MOD_DISPLAY = {"Dota2": {
            "mod1": "Sexy Woman Mega-Kill", "mod2": "Announcer Pack 2",
            "mod3": "Emblem of the Diretide Green", "mod4": "Emblem of the Diretide Red",
            "mod5": "Classic Blue Fog"
        }};

        const MOD_INFO = {"Dota2": {
            "mod1": "Гаряча озвучка для серій вбивств.", "mod2": "Другий пакет крутих коментарів.",
            "mod3": "Зелене сяйво Diretide для справжніх олдів.", "mod4": "Червоне сяйво Diretide, виглядає агресивно.",
            "mod5": "Повертає атмосферний синій туман."
        }};

        const MOD_SOURCES = {
            "mod1": "https://en.dota2changer.com/skins_dota_2_mods-sexy_woman_mega-kill/",
            "mod3": "https://h6rd.github.io/Dota2PornFxWeb/?category=emblems&mod=Emblem+of+the+Diretide+Green",
            "mod4": "https://h6rd.github.io/Dota2PornFxWeb/?category=emblems&mod=Emblem+of+the+Diretide+Red"
        };

        const GAME_MAIN_IMAGES = {"Dota2": "images/game1.jpg", "Test": "images/game2.jpg"};

        // ЛОГІКА САЙТУ
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function renderHome() {
            const list = document.getElementById('games-list');
            list.innerHTML = Object.keys(CATEGORY_MODS_MAP).map((game, i) => `
                <div class="game-card" onclick="renderCategories('${game}')" style="animation-delay: ${i*0.1}s;">
                    <img src="static/${GAME_MAIN_IMAGES[game]}" onerror="this.src='https://via.placeholder.com/300x160'">
                    <div class="game-name">${game}</div>
                </div>
            `).join('');
        }

        function renderCategories(game) {
            const list = document.getElementById('categories-list');
            document.getElementById('cat-game-title').innerText = game;
            const cats = CATEGORY_MODS_MAP[game];
            const imgFolder = CATEGORY_IMAGES[game];
            
            list.innerHTML = Object.keys(cats).map((catId, i) => `
                <div class="game-card" onclick="renderMods('${game}', '${catId}')" style="animation-delay: ${i*0.1}s;">
                    <img src="static/${imgFolder}/${catId}.png">
                    <div class="game-name">${CATEGORY_DISPLAY[game][catId]}</div>
                    <div class="info-box">${CATEGORY_INFO[game][catId]}</div>
                </div>
            `).join('');
            showPage('categories');
        }

        function renderMods(game, catId) {
            const list = document.getElementById('mods-list');
            document.getElementById('mod-cat-title').innerText = CATEGORY_DISPLAY[game][catId];
            document.getElementById('back-to-cats').onclick = () => renderCategories(game);
            
            const mods = CATEGORY_MODS_MAP[game][catId];
            const imgFolder = MOD_IMAGES[game];

            list.innerHTML = mods.map(([file, modId], i) => {
                const srcUrl = MOD_SOURCES[modId];
                const srcBtn = srcUrl ? `<a href="${srcUrl}" target="_blank" class="source-btn">Source</a>` : "";
                return `
                <div id="card-${modId}" class="game-card" style="animation-delay: ${i*0.05}s;">
                    ${srcBtn}
                    <img src="static/${imgFolder}/${modId}.png" onclick="alert('Файл: ${file} буде скачано')">
                    <div class="game-name">${MOD_DISPLAY[game][modId]}</div>
                    <div class="info-box">${MOD_INFO[game][modId]}</div>
                </div>`;
            }).join('');
            showPage('mods');
        }

        // ПОШУК (ТОЧНО ЯК В MODS.PY)
        const searchInput = document.getElementById('live-search');
        const resultsBox = document.getElementById('search-results');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 1) { resultsBox.style.display = 'none'; return; }
            let res = [];
            Object.keys(CATEGORY_MODS_MAP).forEach(game => {
                Object.keys(CATEGORY_MODS_MAP[game]).forEach(catId => {
                    CATEGORY_MODS_MAP[game][catId].forEach(([file, modId]) => {
                        const disp = MOD_DISPLAY[game][modId];
                        if (disp.toLowerCase().includes(query)) {
                            res.push({ game, catId, modId, disp });
                        }
                    });
                });
            });
            if (res.length > 0) {
                resultsBox.innerHTML = res.slice(0, 10).map(r => `
                    <div class="result-item" onclick="goToMod('${r.game}', '${r.catId}', '${r.modId}')">
                        <img src="static/${MOD_IMAGES[r.game]}/${r.modId}.png">
                        <div><b>${r.disp}</b><br><small>${r.game}</small></div>
                    </div>`).join('');
                resultsBox.style.display = 'block';
            } else resultsBox.style.display = 'none';
        });

        function goToMod(game, cat, id) {
            resultsBox.style.display = 'none';
            renderMods(game, cat);
            setTimeout(() => { 
                const el = document.getElementById('card-' + id);
                if(el) { el.scrollIntoView(); location.hash = 'card-' + id; }
            }, 100);
        }

        function toggleModal() {
            const m = document.getElementById('installModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        renderHome();
    </script>
</body>
</html>
